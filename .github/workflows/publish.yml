name: Publish to PyPI

on:
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  test_and_coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build coverage # Install coverage here
          pip install -e .[dev] # Install dev dependencies for coverage
	
      - name: Run tests with coverage
	    run: |
	      coverage run -m unittest discover tests
	      coverage report -m # Print coverage report to console
	      coverage xml -o coverage.xml # Generate XML report for potential upload to Codecov/etc.

      - name: Upload coverage report
	    uses: actions/upload-artifact@v4
	    with:
	      name: coverage-report
	      path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test_and_coverage # Depends on tests passing
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-to-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download dists
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1